<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --accent: #4fffb0;
      --accent-dim: rgba(79,255,176,0.12);
      --text: #e8edf5;
      --muted: #5a6478;
      --danger: #ff4f6a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.15;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: #4fffb0;
      top: -100px; left: -100px;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: #4f8fff;
      bottom: -80px; right: -80px;
      animation: blobFloat 10s ease-in-out infinite reverse;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 520px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(79,255,176,0.05),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,255,176,0.2);
      border-radius: 100px;
      padding: 4px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 36px;
      letter-spacing: 0.02em;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      resize: none;
      height: 100px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    textarea:focus {
      border-color: rgba(79,255,176,0.4);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.06);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #080c14;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    button:hover::after { transform: translateX(100%); }
    button:hover { background: #6fffbe; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,255,176,0.25); }
    button:active { transform: translateY(0); }

    button:disabled {
      background: rgba(79,255,176,0.15);
      color: rgba(79,255,176,0.4);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button:disabled::after { display: none; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(79,255,176,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      margin-top: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      min-height: 20px;
      text-align: center;
      transition: all 0.3s;
    }

    .sheet-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,255,176,0.1);
      border: 1px solid rgba(79,255,176,0.25) !important;
      color: var(--accent) !important;
      padding: 8px 18px !important;
      border-radius: 8px !important;
      font-family: 'Syne', sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      text-decoration: none;
      margin-top: 8px;
      transition: all 0.2s;
      width: auto !important;
    }

    .sheet-btn:hover {
      background: rgba(79,255,176,0.18) !important;
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 16px rgba(79,255,176,0.15) !important;
    }

    .success-msg {
      color: var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .error-msg { color: var(--danger); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .footer {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="badge">AI-Powered Search</div>
    <h1>Find <span>Vendors</span><br>& Leads</h1>
    <p class="subtitle">Describe what you're looking for → results go to Google Sheet</p>

    <label class="input-label" for="query">Search Query</label>
    <div class="input-group">
      <textarea
        id="query"
        placeholder="e.g. ServiceNow consultants in Bangalore&#10;IT staffing companies in Noida&#10;SAP developers with 5+ years experience"
      ></textarea>
    </div>

    <button id="search_button" onclick="search()">Search Vendors</button>

    <div id="status"></div>

    <div class="divider"></div>
    <p class="footer">Results are saved to your Google Sheet automatically</p>
  </div>

  <script>
    // Resume state if page was refreshed mid-search
    if (localStorage.getItem('searching') === 'true') {
      const btn = document.getElementById('search_button');
      const statusEl = document.getElementById('status');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Searching...';
      statusEl.innerHTML = `<span>Searching for "<strong>${localStorage.getItem('query')}</strong>"...</span>`;

      setTimeout(() => {
        localStorage.removeItem('searching');
        localStorage.removeItem('query');
        btn.disabled = false;
        btn.innerHTML = 'Search Vendors';
        statusEl.innerHTML = '<span class="error-msg">Search timed out. Please check your Google Sheet.</span>';
      }, 60000);
    }

    async function search() {
      const query = document.getElementById("query").value.trim();
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("search_button");

      if (!query) {
        statusEl.innerHTML = '<span class="error-msg">Please enter a search query</span>';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Searching...';
      statusEl.innerHTML = 'Triggering search...';

      localStorage.setItem('searching', 'true');
      localStorage.setItem('query', query);

      try {
        const res = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });

        if (!res.ok) throw new Error("HTTP error: " + res.status);

        const data = await res.json();

        if (data.status === "Done") {
          statusEl.innerHTML = `
            <div class="success-msg">
              <span>✓ Search triggered! Results will appear in your sheet shortly.</span>
              <a class="sheet-btn" href="${data.link}" target="_blank">
                📊 Open Google Sheet
              </a>
            </div>`;
        } else {
          statusEl.innerHTML = '<span class="error-msg">Something failed on server</span>';
        }
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = '<span class="error-msg">Error occurred. Please try again.</span>';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Search Vendors';
        document.getElementById("query").value = "";
        localStorage.removeItem('searching');
        localStorage.removeItem('query');
      }
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('query').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) search();
    });
  </script>
</body>
</html>
